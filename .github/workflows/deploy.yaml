# AWS (account 297063078864, us-west-2) — provisioned via CLI:
#   S3:     s3://fsm-finance-dashboard-297063078864
#   OAC:    E132OH94KFZLK2
#   CF:     E24EIPWI6ZPYBY  →  https://d3glwhukv87k4z.cloudfront.net
# See infrastructure/ for CloudFront config JSON and bucket policy template.
#
# Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (IAM user must allow s3:PutObject on
# the bucket and cloudfront:CreateInvalidation on the distribution).
#
# Set repository secret VITE_API_URL to your production API origin (no trailing slash),
# e.g. https://finance.fullsend.management — required at build time for Vite.
name: Deploy Finance Dashboard to S3/CloudFront

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-finance-dashboard
  cancel-in-progress: true

env:
  AWS_REGION: us-west-2
  FINANCE_DASHBOARD_S3_BUCKET: fsm-finance-dashboard-297063078864
  FINANCE_DASHBOARD_CLOUDFRONT_ID: E24EIPWI6ZPYBY

jobs:
  deploy:
    name: Build and sync to S3 / invalidate CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload site to S3
        run: |
          aws s3 sync dist/ "s3://${FINANCE_DASHBOARD_S3_BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${FINANCE_DASHBOARD_S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${FINANCE_DASHBOARD_CLOUDFRONT_ID}" \
            --paths "/*"
